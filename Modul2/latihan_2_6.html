<!DOCTYPE html>
<html>
<head>
    <title>Latihan 2.6 - Image Map</title>
</head>
<body>

<div id="content">

    <h1>Ujicoba Image Map</h1>

    <img src="./image/Peta.webp" width="600" alt="Workplace" usemap="#petagambar">

    <map name="petagambar">
        <area shape="rect" coords="34,44,270,350"
              alt="Computer"
              href="https://en.wikipedia.org/wiki/Computer">

        <area shape="rect" coords="290,172,333,250"
              alt="Phone"
              href="https://en.wikipedia.org/wiki/Telephone">

        <area shape="circle" coords="337,300,44"
              alt="Coffee"
              href="https://en.wikipedia.org/wiki/Coffee">
    </map>

    <h2>Kesimpulan</h2>
    <p> Image map ini dapat digunakan untuk mengklik beberapa area pada satu gambar dan akan dialihkan ke halaman berbeda </p>

</div>

</body>
</html>
